front:
  text: 太上修真玄章别一
  hash: sha256:781b791aab2faa88113f866682ae6ee029bd8e34725b82e68d75ae1e30c70295
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0066_HFL_000-001a, image: hfl/0724/0724-004.png}
body:
  text: 一炁化生章第一神者性也有天地之性有氣質之性父母未生已前即天地之性父母既生之後即氣質之性氣者有天地之氣真炁也父母之氣凡炁也蓋人初在母腹中受父精母血成其眹兆也所謂凡炁合空洞帝真九炁而全其體段所謂真炁也一炁生胞二炁生胎三炁長靈明仙之炁而生𩱿性始來以體段未具而不能靈迨夫四炁𩲸生五氣臟生第六炁高眞冲融之炁而生靈體段始具則能動動則神生神生則性靈至九月炁足十月胎圓然後降生性命根蒂章第二神仙云人在母腹中其臍帶與母臍帶相連母呼亦呼母吸亦吸及乎降誕剪去臍帶然後各自呼吸而所受父母一點凡炁則棲子下丹田中而寄體於腎其丹田前對臍後對腎在臍腎之間其連如環廣一寸二分有二竅以應乾坤上通泥丸下貫湧泉旁有六竅以應坎離震巽艮兊以通六腑一身之炁皆聚於此如水之朝東輻之凑轂故此竅爲命之根蒂其性居丹田泥丸而寄體於心泥丸者在人之首明堂之間六合之内是爲頂門故世呼嬰兒頂門爲性門也性門未合皆知宿生因縁等事合則忘之矣故泥九爲性之根能知性根命蒂則始可言修鍊矣先天後天章第三天地之炁有二未受胎已前謂之先天又謂之母炁其爲炁也至大至剛充塞天地周流六虛晝夜不息人纔受胎便禀此炁謂之後天又曰子炁又云日月發生之炁即前所謂混合空洞帝眞九炁是也其實一炁耳其炁亦充塞人腔子裏每日用子時斗柄帖地先天之炁隨斗柄從九地之下發生周流六虛造化萬物子時非人間之子時也日用二六時中常常收視反聽頓覺身中暖炁冲然即其時也丹經云精生其時時至自知百刻之中切忌昏迷天地之炁既生人身之子炁亦感類而從其發生上升丹田點化凡炁以成人身之造化形神玄用章第四形者神氣之舍神者形氣之主形氣非神塊然一物靈神非形氣則茫然無歸宿之地嗚呼神則性也氣則命也二者不可偏廢修性而不修命紫陽云精神屬陰宅舍難固未免長用遷徙之法修命而不修性釋氏云鍊炁純粹壽可萬歲若不眀正覺三昧報盡還來散入諸趣所以儒家云論性不論炁不備論炁不論性不明要知性爲上氣次之金丹作爲章第五鍊金丹者以形譬鼎器氣喻藥物神喻火功忘機絶慮收視返聽使精神魂魄意五者不泄定鼎器也晝牝夜玄攝心一處終日默默如愚如癡採藥物也惺惺不昧了了常如神不外馳其炁自息調火功也是以聖人忘形以養炁忘炁以養神忘神以養虛形神俱妙與道合真所謂忘者非枯木死灰面壁昏坐懵然無知之謂也心若太虛内外貞白圓活如走盤之珠澄湛如印潭之月動而不動靜而不靜必有事焉而勿正心勿忌勿助其長縱之不逸於外制之不拘於内胸次間常虛豁豁地夫是謂眞忌矣若夫虛化神神化炁炁化形死矣是與凡夫無别虛無生化章第六天地之外曰太虛太無總曰虛無又曰虛空以無心故虛故無虛則能容無則能化是以物各付物事各付事形各付形氣各付氣四者各付本根天地自覆載日月自運行陰陽自升降寒暑自往來四時自推遷五炁自順布飛潜自動靜色自色天地亦何容心焉此天地所以能長且久也人不能與天地同長久者以其有心故不能虛無苟能虛無其神自來歸神歸炁復始可言修鍊矣修鍊三治章第七夫修鍊之法當先愼言語次節飲食其次省睡眠此三者乃修仙修佛之大關鍵也胡爲而言哉老君曰玄牝之門是謂天地根綿綿若存用之不勤玄牝者神炁也口鼻者神炁之門户也出息入息長收緩放使之綿綿歸根復命以養元炁故先之以愼言語紫陽云虛無生一炁一炁産陰陽人自日用發生之炁每憑虛而生人纔飢虛便思飲食以故塞其炁其炁既塞不能歸元則隨聲色香味喜怒哀樂耗散之矣故次之以節飲食學道之士如雞抱卵使暖氣相續纔有間斷賺他性命人若貪睡則神離於炁炁無所主奔潰肆逸欲望凝結其可得乎故次之省睡眠神氣交媾章第八既能愼言語節飲食省睡眠然後行内鍊採藥之方坐禪修幻之法次第而行之由先天之母氣下降而後天之子氣上升俱會於丹田默化父母之凡炁旦久月深凡氣鍊盡眞炁充實其炁油然而生莫之能禦自雙關升泥丸與神交姤所謂追二炁於黄道會三性於元宫仍化成甘露自玄雍而下復入丹田一升一降成其造化但要此心虛無一念不動然後相應不然則藥材消耗火候差殊不作丹也此皆出於自然不可存神運炁與揠苗助長之說同日語矣動靜升降章第九動極生靜靜極生動一動一靜互爲其用而已矣如天地之妙其動也闢其靜也翕不闢則不翕不翕則不闢闢兮翕兮生生無窮若靜定之功既極元陽之炁自生炁之生也乾坤震動山嶽動摇龍象爭馳風火相激醍醐灌頂光射簾幃已而淫淫若春澤液液象解冰自頭流達足究竟復上升往來三宫自升自降無暫休息一升一降爲一周天蓋氣上升爲冬至子時一陽生於五陰之下其卦爲復進退至坤六陰既極復變而昇二至二分晦朔弦望五行四象二十八宿三百六十五度攢簇歸一刻之中一刻故有一年之炁象一年三萬六千刻刻刻要調和除却卯酉外可以奪天上三萬年氣數此皆與天地造化默相符合非執文泥象之法也鍊炁成神章第十當此之時氣脉調和精神爽快曦然如浴之方起睡之正醒夫婦合歡子母留戀自神抱其氣氣抱其神日積月累互相交合打成一片陰盡陽純遂成真人迨夫脫胎神化身外有身聚則成形散則成炁去來無礙靈顯自如造化莫能拘陰陽莫能制鬼神莫能測寒暑不能侵逍遥乎無何有之鄉與虛無同其體矣太上修真玄章
